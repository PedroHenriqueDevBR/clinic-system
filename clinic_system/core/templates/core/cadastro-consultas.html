{% extends 'utils/base.html' %}
{% block title %}Registrar hoário de trabalho{% endblock %}
{% block main %}

<div id="register-consultation-hour">

    <div class="card rounded mx-5 my-5 px-5 py-5">
        <div class="div py-4">
            <a href="/dashboard" class="btn">Voltar</a>
        </div>

        <div class="container">
            <form method="post" action="">
                {% csrf_token %}

                <div class="row">
                    <div class="col">
                        <select class="form-select" aria-label="Default select example" name="paciente" id="paciente">
                            <option value="" selected disabled>Paciente</option>
                            {% for paciente in pacientes %}
                            <option value="{{paciente.id}}">{{paciente.name}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col">
                        <select class="form-select" aria-label="Default select example" name="disponibilidade_medic"
                            id="disponibilidade_medic">
                            <option value="" selected disabled>Médico</option>
                            {% for d in disponibilidade %}
                            <option value="{{d.id}}">{{d.medico.name}} // {{d.date}} // {{d.init_hour}} //
                                {{d.end_hour}}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col">
                        <select class="form-select" aria-label="Default select example" name="recepcionista"
                            id="recepcionista">
                            <option value="{{request.user.id}}">{{request.user.username}}</option>
                        </select>
                    </div>

                    <div class="col">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="is_authorized" id="is_authorized">
                            <label class="form-check-label" for="is_authorized">Autorizado</label>
                        </div>
                    </div>
                </div>


                <button type="submit" class="btn primary-color-app white-text full-width mt-3">Salvar</button>
            </form>
        </div>
    </div>



</div>

{% endblock %}
